# Shared volume for the drift baseline: train (this Job) writes baseline.npz,
# the drift CronJob later reads it. Single-node cluster, never mounted at the
# same time, so ReadWriteOnce is fine.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: baseline
  namespace: pipeline-ml
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 256Mi
---
# A Job runs a pod to completion ONCE (vs a Deployment, which keeps it running
# forever). Perfect for "train the model, then exit".
apiVersion: batch/v1
kind: Job
metadata:
  name: train
  namespace: pipeline-ml
spec:
  backoffLimit: 6                  # retry a few times if mlflow isn't ready yet
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-mlflow
          image: pipeline-ml-inference:dev
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until python -c \"import urllib.request; urllib.request.urlopen('http://mlflow:5000/health')\"; do echo 'waiting for mlflow'; sleep 3; done"]
      containers:
        - name: train
          image: pipeline-ml-inference:dev
          imagePullPolicy: IfNotPresent
          command: ["python", "ml/train.py"]
          envFrom:
            - configMapRef: { name: pipeline-config }   # MLFLOW_* + PIPELINE_ARTIFACTS_DIR
          env:
            - name: PREDICTIONS_DB_URL
              valueFrom:
                secretKeyRef: { name: pipeline-secret, key: PREDICTIONS_DB_URL }
          volumeMounts:
            - name: baseline
              mountPath: /shared/artifacts
      volumes:
        - name: baseline
          persistentVolumeClaim: { claimName: baseline }
